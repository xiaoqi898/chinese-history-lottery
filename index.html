<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>前世今生 — 中国历史身份抽签</title>
  <meta name="description" content="如果你出生在中国历史的某个朝代，你会是谁？抽一张命运之签，穿越千年。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ========== Reset & Base ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-dark: #0a0a0f;
      --bg-card: #1a1a2e;
      --bg-overlay: rgba(10,10,15,0.92);
      --gold: #d4a843;
      --gold-light: #f0d78c;
      --red: #c41e3a;
      --text: #e8e6e3;
      --text-muted: #8a8a9a;
      --text-dim: #555566;
      --font-serif: 'Noto Serif SC', 'Songti SC', serif;
      --font-sans: 'Noto Sans SC', 'PingFang SC', sans-serif;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== Background Particles ========== */
    #particles-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ========== Pages ========== */
    .page {
      display: none;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }
    .page.active { display: flex; flex-direction: column; }

    /* ========== HOME PAGE ========== */
    #page-home {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .home-seal {
      width: 120px; height: 120px;
      border: 3px solid var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-serif);
      font-size: 3rem;
      color: var(--gold);
      margin-bottom: 2rem;
      animation: breathe 4s ease-in-out infinite;
      position: relative;
    }
    .home-seal::before {
      content: '';
      position: absolute;
      inset: -8px;
      border: 1px solid rgba(212,168,67,0.3);
      border-radius: 50%;
      animation: breathe 4s ease-in-out infinite reverse;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }

    .home-title {
      font-family: var(--font-serif);
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--gold-light);
      margin-bottom: 0.5rem;
      text-shadow: 0 0 40px rgba(212,168,67,0.3);
    }

    .home-subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 3rem;
      letter-spacing: 0.1em;
      line-height: 1.8;
    }

    .home-stats {
      display: flex;
      gap: 2rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat-item {
      text-align: center;
    }
    .stat-item .num {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      color: var(--gold);
      font-weight: 700;
    }
    .stat-item .label {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 0.25rem;
    }

    /* ========== Primary Button ========== */
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #b8941f);
      color: var(--bg-dark);
      border: none;
      padding: 1rem 3rem;
      font-size: 1.2rem;
      font-family: var(--font-serif);
      font-weight: 700;
      letter-spacing: 0.15em;
      border-radius: 60px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 4px 30px rgba(212,168,67,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(212,168,67,0.5);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: translateX(-100%);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .btn-secondary {
      background: transparent;
      color: var(--gold);
      border: 1px solid rgba(212,168,67,0.4);
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
      font-family: var(--font-sans);
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-secondary:hover {
      border-color: var(--gold);
      background: rgba(212,168,67,0.1);
    }

    .home-footer {
      margin-top: 4rem;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* ========== DRAW PAGE ========== */
    #page-draw {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .draw-instruction {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      animation: fadeInUp 0.8s ease;
    }

    .lottery-container {
      perspective: 1200px;
      margin-bottom: 2rem;
    }

    .lottery-card {
      width: 220px; height: 320px;
      position: relative;
      transform-style: preserve-3d;
      cursor: pointer;
      margin: 0 auto;
    }

    .lottery-card.flipping .card-front {
      animation: flipOut 0.6s forwards;
    }
    .lottery-card.flipping .card-back {
      animation: flipIn 0.6s 0.6s forwards;
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      overflow: hidden;
    }

    .card-front {
      background: linear-gradient(145deg, #2a1a0a, #1a0a00);
      border: 2px solid var(--gold);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(212,168,67,0.2), inset 0 0 30px rgba(212,168,67,0.05);
    }
    .card-front .seal-char {
      font-family: var(--font-serif);
      font-size: 4rem;
      color: var(--gold);
      opacity: 0.8;
    }
    .card-front .card-label {
      font-family: var(--font-serif);
      font-size: 1rem;
      color: var(--gold-light);
      margin-top: 1rem;
      letter-spacing: 0.3em;
    }
    .card-front .tap-hint {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 2rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .card-back {
      background: var(--bg-card);
      border: 2px solid #333;
      transform: rotateY(180deg);
      opacity: 0;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card-back.revealed {
      opacity: 1;
    }

    @keyframes flipOut {
      0% { transform: rotateY(0); }
      100% { transform: rotateY(90deg); opacity: 0; }
    }
    @keyframes flipIn {
      0% { transform: rotateY(-90deg); opacity: 0; }
      100% { transform: rotateY(0); opacity: 1; }
    }

    .draw-particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* ========== RESULT PAGE ========== */
    #page-result {
      align-items: center;
      padding: 2rem 1.5rem 4rem;
    }

    .result-card-wrapper {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .result-card {
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      animation: cardSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardSlideUp {
      0% { transform: translateY(60px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* Rarity glow */
    .result-card.legendary {
      border: 2px solid #FF6B00;
      box-shadow: 0 0 40px rgba(255,107,0,0.3), 0 20px 60px rgba(0,0,0,0.5);
    }
    .result-card.epic {
      border: 2px solid #A855F7;
      box-shadow: 0 0 30px rgba(168,85,247,0.25), 0 20px 60px rgba(0,0,0,0.5);
    }
    .result-card.rare {
      border: 2px solid #3B82F6;
      box-shadow: 0 0 20px rgba(59,130,246,0.2), 0 20px 60px rgba(0,0,0,0.5);
    }
    .result-card.common {
      border: 2px solid #4a4a5a;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .result-header {
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      position: relative;
    }

    .result-header .dynasty-banner {
      font-family: var(--font-serif);
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .result-header .occupation-name {
      font-family: var(--font-serif);
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }

    .result-header .rarity-badge {
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
    }
    .result-header .rarity-badge.legendary { background: rgba(255,107,0,0.2); color: #FFD700; border: 1px solid rgba(255,107,0,0.4); }
    .result-header .rarity-badge.epic { background: rgba(168,85,247,0.2); color: #C084FC; border: 1px solid rgba(168,85,247,0.4); }
    .result-header .rarity-badge.rare { background: rgba(59,130,246,0.2); color: #93C5FD; border: 1px solid rgba(59,130,246,0.4); }
    .result-header .rarity-badge.common { background: rgba(107,114,128,0.2); color: #9CA3AF; border: 1px solid rgba(107,114,128,0.4); }

    .result-stars {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
    }

    .result-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,168,67,0.3), transparent);
      margin: 0 1.5rem;
    }

    .result-details {
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .detail-item {
      text-align: center;
      padding: 0.75rem;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
    }
    .detail-item .detail-icon { font-size: 1.2rem; margin-bottom: 0.25rem; }
    .detail-item .detail-label { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.25rem; }
    .detail-item .detail-value { font-size: 0.9rem; color: var(--text); font-weight: 500; }

    .result-story {
      padding: 1.5rem;
    }
    .result-story .story-title {
      font-family: var(--font-serif);
      font-size: 0.85rem;
      color: var(--gold);
      margin-bottom: 0.75rem;
      letter-spacing: 0.15em;
    }
    .result-story .story-text {
      font-size: 0.95rem;
      line-height: 1.9;
      color: var(--text);
      text-align: justify;
      min-height: 80px;
    }
    .story-text.loading {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--gold);
      margin-left: 2px;
      animation: blink 1s infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .result-tags {
      padding: 0 1.5rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }
    .tag {
      padding: 0.3rem 0.8rem;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .result-actions {
      padding: 1.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-action {
      padding: 0.7rem 1.5rem;
      border-radius: 30px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: none;
      font-family: var(--font-sans);
    }
    .btn-action.primary {
      background: linear-gradient(135deg, var(--gold), #b8941f);
      color: var(--bg-dark);
      font-weight: 600;
    }
    .btn-action.secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-action:hover {
      transform: translateY(-1px);
    }

    /* ========== SHARE PAGE (modal overlay) ========== */
    .share-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg-overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .share-overlay.active { display: flex; }

    .share-card {
      width: 100%;
      max-width: 380px;
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
    }

    .share-preview {
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .share-preview .share-title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      color: var(--gold-light);
      margin-bottom: 0.5rem;
    }
    .share-preview .share-identity {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }
    .share-preview .share-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      line-height: 1.6;
    }
    .share-preview .share-tags {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .share-actions {
      padding: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .share-qrcode-area {
      text-align: center;
      padding: 0.5rem 1.5rem 1rem;
    }
    .share-qrcode-area canvas {
      border-radius: 8px;
    }
    .share-watermark {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 0.5rem;
    }

    /* ========== Loading Spinner ========== */
    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 2px solid rgba(212,168,67,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== Animations ========== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 8px; height: 8px;
      z-index: 50;
      pointer-events: none;
      animation: confettiFall 2s ease-out forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ========== Toast ========== */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(30,30,50,0.95);
      color: var(--text);
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-size: 0.85rem;
      z-index: 200;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.3s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ========== Responsive ========== */
    @media (max-width: 480px) {
      .home-title { font-size: 2rem; }
      .home-subtitle { font-size: 0.95rem; }
      .lottery-card { width: 180px; height: 260px; }
      .card-front .seal-char { font-size: 3rem; }
      .result-header .occupation-name { font-size: 1.8rem; }
      .result-details { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .result-card-wrapper { max-width: 100%; }
      .btn-primary { padding: 0.85rem 2.5rem; font-size: 1.05rem; }
    }

    @media (min-width: 768px) {
      .home-title { font-size: 3.5rem; }
      .result-card-wrapper { max-width: 440px; }
    }

    /* ========== History drawer ========== */
    .history-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 50;
      background: rgba(26,26,46,0.9);
      border: 1px solid rgba(212,168,67,0.3);
      color: var(--gold);
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }
    .history-toggle:hover { background: rgba(212,168,67,0.15); }

    .history-drawer {
      position: fixed;
      top: 0; right: -320px;
      width: 300px;
      height: 100vh;
      background: var(--bg-card);
      z-index: 90;
      transition: right 0.3s ease;
      overflow-y: auto;
      padding: 4rem 1rem 2rem;
      border-left: 1px solid rgba(255,255,255,0.08);
    }
    .history-drawer.open { right: 0; }
    .history-drawer .drawer-title {
      font-family: var(--font-serif);
      font-size: 1rem;
      color: var(--gold);
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
    }
    .history-item {
      padding: 0.75rem;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .history-item:hover { background: rgba(255,255,255,0.08); }
    .history-item .hi-dynasty { font-size: 0.7rem; color: var(--text-dim); }
    .history-item .hi-occupation { font-size: 0.9rem; font-weight: 500; }
    .history-item .hi-region { font-size: 0.75rem; color: var(--text-muted); }
    .history-empty {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-align: center;
      padding: 2rem 0;
    }

    /* ========== Back button ========== */
    .back-btn {
      position: absolute;
      top: 1rem; left: 1rem;
      z-index: 10;
      background: rgba(26,26,46,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.3); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Background Particles -->
  <canvas id="particles-canvas"></canvas>

  <!-- History Toggle -->
  <button class="history-toggle" onclick="toggleHistory()" title="抽签记录">📜</button>

  <!-- History Drawer -->
  <div class="history-drawer" id="historyDrawer">
    <div class="drawer-title">抽签记录</div>
    <div id="historyList">
      <div class="history-empty">还没有抽过签</div>
    </div>
  </div>

  <!-- ========== PAGE: HOME ========== -->
  <div class="page active" id="page-home">
    <div class="home-seal">签</div>
    <h1 class="home-title">前世今生</h1>
    <p class="home-subtitle">
      中国历史身份抽签<br>
      如果命运让你出生在千年之前，你会是谁？
    </p>
    <div class="home-stats">
      <div class="stat-item">
        <div class="num">40亿+</div>
        <div class="label">曾经活过的中国人</div>
      </div>
      <div class="stat-item">
        <div class="num">4000年</div>
        <div class="label">信史跨度</div>
      </div>
      <div class="stat-item">
        <div class="num">∞</div>
        <div class="label">命运可能</div>
      </div>
    </div>
    <button class="btn-primary" onclick="startDraw()">
      开 始 抽 签
    </button>
    <div class="home-footer">
      基于历史人口数据 · AI 生成独特命运故事
    </div>
  </div>

  <!-- ========== PAGE: DRAW ========== -->
  <div class="page" id="page-draw">
    <button class="back-btn" onclick="goHome()">←</button>
    <p class="draw-instruction">轻触命运之签，揭晓你的前世身份</p>
    <div class="lottery-container">
      <div class="lottery-card" id="lotteryCard" onclick="drawCard()">
        <div class="card-front">
          <div class="seal-char">命</div>
          <div class="card-label">命运之签</div>
          <div class="tap-hint">轻触揭晓 ↓</div>
        </div>
        <div class="card-back" id="cardBack">
          <!-- Dynamic content -->
        </div>
      </div>
    </div>
  </div>

  <!-- ========== PAGE: RESULT ========== -->
  <div class="page" id="page-result">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="result-card-wrapper" id="resultWrapper">
      <!-- Dynamic result card -->
    </div>
  </div>

  <!-- ========== SHARE OVERLAY ========== -->
  <div class="share-overlay" id="shareOverlay">
    <div class="share-card">
      <div class="share-preview" id="sharePreview">
        <!-- Dynamic -->
      </div>
      <div class="share-actions">
        <button class="btn-action primary" onclick="generateShareImage()">📷 生成图片</button>
        <button class="btn-action secondary" onclick="copyShareText()">📋 复制文案</button>
        <button class="btn-action secondary" onclick="closeShare()">✕ 关闭</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Hidden canvas for share image -->
  <canvas id="shareCanvas" style="display:none;" width="750" height="1334"></canvas>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
